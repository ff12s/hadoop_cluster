# Hadoop_cluster Workflow Feature Implementation With E2e Test

## Action

Follow the feature-implementation-with-e2e-test workflow:
1. Implement the feature (e.g., add new service, resolver, or DAG) in code/config files.
2. Add or update docker-compose.yml to wire up the new component.
3. Create or update an end-to-end test script in tests/ (e.g., .sh or .bat) to validate the new feature.
4. Update .gitignore as needed for new artifacts or mount points.
5. Iteratively fix and refine the test script and configs based on test results.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: docker-compose.yml, tests/test-*.sh, tests/test-*.bat

