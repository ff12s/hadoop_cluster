server:
  applicationConnectors:
    - type: http
      port: 5000
  adminConnectors:
    - type: http
      port: 5001

logging:
  level: INFO

db:
  driverClass: org.postgresql.Driver
  url: jdbc:postgresql://marquez-db:5432/marquez
  user: marquez
  password: marquez
  # При 2 подах Marquez с maxSize=10 худший случай — 20 соединений суммарно,
  # что заметно меньше max_connections=100 по умолчанию в Postgres и оставляет
  # запас для других клиентов (psql, прочие сервисы)
  minSize: 2
  maxSize: 10
  initialSize: 2
  checkConnectionOnBorrow: true
  maxWaitForConnection: 5s

# Run DB migrations on startup
migrateOnStartup: true

