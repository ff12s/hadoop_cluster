worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Disable buffering for sub_filter to work on all responses
    proxy_buffering on;

    # Common proxy settings
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ========================
    # HDFS NameNode UI (:9870)
    # ========================
    server {
        listen 9870;
        location / {
            proxy_pass http://namenode:9870;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_redirect ~*http://namenode(:(\d+))?(/.*)$ http://localhost:$2$3;
            proxy_redirect ~*http://datanode(:(\d+))?(/.*)$ http://localhost:$2$3;

            sub_filter 'namenode:9870' 'localhost:9870';
            sub_filter 'namenode:8088' 'localhost:8088';
            sub_filter 'datanode:9864' 'localhost:9864';
            sub_filter 'datanode:8042' 'localhost:8042';
            sub_filter_once off;
            sub_filter_types text/html application/javascript application/json text/xml text/css application/xml;
        }
    }

    # ================================
    # YARN ResourceManager UI (:8088)
    # ================================
    server {
        listen 8088;
        location / {
            proxy_pass http://namenode:8088;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_redirect ~*http://namenode(:(\d+))?(/.*)$ http://localhost:$2$3;
            proxy_redirect ~*http://datanode(:(\d+))?(/.*)$ http://localhost:$2$3;

            sub_filter 'namenode:8088' 'localhost:8088';
            sub_filter 'namenode:8188' 'localhost:8188';
            sub_filter 'namenode:9870' 'localhost:9870';
            sub_filter 'datanode:8042' 'localhost:8042';
            sub_filter 'datanode:9864' 'localhost:9864';
            sub_filter 'hiveserver2:10002' 'localhost:10002';
            sub_filter_once off;
            sub_filter_types text/html application/javascript application/json text/xml text/css application/xml;
        }
    }

    # ==================================
    # YARN Timeline Server UI (:8188)
    # ==================================
    server {
        listen 8188;
        location / {
            proxy_pass http://namenode:8188;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";
            proxy_http_version 1.1;

            proxy_redirect ~*http://namenode(:(\d+))?(/.*)$ http://localhost:$2$3;

            sub_filter 'namenode:8188' 'localhost:8188';
            sub_filter 'namenode:8088' 'localhost:8088';
            sub_filter 'datanode:8042' 'localhost:8042';
            sub_filter_once off;
            sub_filter_types text/html application/javascript application/json text/xml text/css application/xml;
        }
    }

    # ===========================
    # HDFS DataNode UI (:9864)
    # ===========================
    server {
        listen 9864;
        location / {
            proxy_pass http://datanode:9864;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";

            proxy_redirect ~*http://namenode(:(\d+))?(/.*)$ http://localhost:$2$3;
            proxy_redirect ~*http://datanode(:(\d+))?(/.*)$ http://localhost:$2$3;

            sub_filter 'namenode:9870' 'localhost:9870';
            sub_filter 'datanode:9864' 'localhost:9864';
            sub_filter_once off;
            sub_filter_types text/html application/javascript application/json text/xml text/css application/xml;
        }
    }

    # ===============================
    # YARN NodeManager UI (:8042)
    # ===============================
    server {
        listen 8042;
        location / {
            proxy_pass http://datanode:8042;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";

            proxy_redirect ~*http://namenode(:(\d+))?(/.*)$ http://localhost:$2$3;
            proxy_redirect ~*http://datanode(:(\d+))?(/.*)$ http://localhost:$2$3;

            sub_filter 'namenode:8088' 'localhost:8088';
            sub_filter 'datanode:8042' 'localhost:8042';
            sub_filter 'datanode:9864' 'localhost:9864';
            sub_filter_once off;
            sub_filter_types text/html application/javascript application/json text/xml text/css application/xml;
        }
    }

    # =======================
    # HiveServer2 UI (:10002)
    # =======================
    server {
        listen 10002;
        location / {
            proxy_pass http://hiveserver2:10002;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";

            sub_filter 'hiveserver2:10002' 'localhost:10002';
            sub_filter_once off;
            sub_filter_types text/html application/javascript application/json text/xml text/css application/xml;
        }
    }

    # =================
    # TEZ UI (:9999)
    # =================
    server {
        listen 9999;
        location / {
            proxy_pass http://tez-ui:9999;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";

            sub_filter 'namenode:8188' 'localhost:8188';
            sub_filter 'namenode:8088' 'localhost:8088';
            sub_filter_once off;
            sub_filter_types text/html application/javascript application/json text/xml text/css application/xml;
        }
    }

    # ============================
    # Spark History Server (:18080)
    # ============================
    server {
        listen 18080;
        location / {
            proxy_pass http://spark-history:18080;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";

            sub_filter 'spark-history:18080' 'localhost:18080';
            sub_filter 'namenode:8088' 'localhost:8088';
            sub_filter_once off;
            sub_filter_types text/html application/javascript application/json text/xml text/css application/xml;
        }
    }
}
