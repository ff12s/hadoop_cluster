version: '3.8'

x-versions: &versions
  HADOOP_VERSION: ${HADOOP_VERSION}
  HIVE_VERSION: ${HIVE_VERSION}
  SPARK_VERSION: ${SPARK_VERSION}
  SCALA_VERSION: ${SCALA_VERSION}
  PYTHON_VERSION: ${PYTHON_VERSION}
  KYUUBI_VERSION: ${KYUUBI_VERSION}
  TEZ_VERSION: ${TEZ_VERSION}
  JUPYTER_VERSION: ${JUPYTER_VERSION}
  OPENLINEAGE_VERSION: ${OPENLINEAGE_VERSION}
  OPENLINEAGE_NAMESPACE: ${OPENLINEAGE_NAMESPACE}
  JAVA_VERSION: ${JAVA_VERSION}

services:
  base:
    build:
      context: ./base
      dockerfile: Dockerfile
      args:
        <<: *versions
    image: hadoop-cluster-base:latest
    profiles: ["build"]
  spark-image:
    build:
      context: ./spark
      dockerfile: Dockerfile
      args:
        <<: *versions
    image: hadoop-cluster-spark:latest
    profiles: ["build"]
  marquez-db:
    image: postgres:13
    container_name: hadoop-marquez-db
    hostname: marquez-db
    environment:
      <<: *versions
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
    volumes:
      - marquez-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Expose Marquez Postgres on host port 5433
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez"]
      interval: 5s
      timeout: 5s
      retries: 20

  marquez:
    image: marquezproject/marquez:latest
    container_name: hadoop-marquez
    hostname: marquez
    depends_on:
      marquez-db:
        condition: service_healthy
    environment:
      <<: *versions
      MARQUEZ_DB_HOST: marquez-db
      MARQUEZ_DB_PORT: 5432
      MARQUEZ_DB: marquez
      MARQUEZ_USER: marquez
      MARQUEZ_PASSWORD: marquez
      MARQUEZ_PORT: 5000
      MARQUEZ_CONFIG: /usr/src/app/config/config.yml
    ports:
      - "5000:5000"  # OpenLineage/Marquez API
    volumes:
      - ./marquez/config:/usr/src/app/config:ro

  marquez-web:
    image: marquezproject/marquez-web:latest
    container_name: hadoop-marquez-web
    hostname: marquez-web
    depends_on:
      - marquez
    environment:
      <<: *versions
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: 5000
      MARQUEZ_URL: http://marquez:5000
      WEB_PORT: 3000
    ports:
      - "3000:3000"  # Marquez Web UI
  postgres:
    image: postgres:13
    container_name: hadoop-postgres
    hostname: postgres
    environment:
      <<: *versions
      POSTGRES_DB: hive_metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"  # Hive Metastore PostgreSQL (non-default port to avoid conflicts)

  namenode:
    image: hadoop-cluster-base:latest
    container_name: hadoop-namenode
    hostname: namenode
    user: "0:0"
    volumes:
      - namenode-data:/opt/hadoop/dfs/name
      - namenode-logs:/opt/hadoop/logs
      - timeline-data:/opt/hadoop/timeline-data
      - ./hive/config/hive-site.xml:/opt/hadoop/etc/hadoop/hive-site.xml:ro
      - ./hive/config/tez-site.xml:/opt/hadoop/etc/hadoop/tez-site.xml:ro
    environment:
      <<: *versions
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    command: ["/opt/scripts/start-namenode.sh"]

  datanode:
    image: hadoop-cluster-base:latest
    container_name: hadoop-datanode
    hostname: datanode
    volumes:
      - datanode-data:/opt/hadoop/dfs/data
      - datanode-logs:/opt/hadoop/logs
      - ./hive/config/hive-site.xml:/opt/hadoop/etc/hadoop/hive-site.xml:ro
      - ./hive/config/tez-site.xml:/opt/hadoop/etc/hadoop/tez-site.xml:ro
    environment:
      <<: *versions
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    depends_on:
      - namenode
    command: ["/opt/scripts/start-datanode.sh"]

  hive-metastore:
    build:
      context: ./hive
      dockerfile: Dockerfile
      args:
        <<: *versions
    image: hadoop-cluster-hive:latest
    container_name: hadoop-hive-metastore
    hostname: hive-metastore
    ports:
      - "9083:9083"  # Hive Metastore
    volumes:
      - hive-warehouse:/opt/hive/warehouse
      - hive-logs:/opt/hive/logs
    environment:
      <<: *versions
    depends_on:
      - postgres
      - namenode
    command: ["/opt/scripts/start-metastore.sh"]

  hiveserver2:
    image: hadoop-cluster-hive:latest
    container_name: hadoop-hiveserver2
    hostname: hiveserver2
    ports:
      - "10000:10000"  # HiveServer2 Thrift
    volumes:
      - hive-warehouse:/opt/hive/warehouse
      - hive-logs:/opt/hive/logs
    environment:
      <<: *versions
    depends_on:
      - hive-metastore
      - namenode
    command: ["/opt/scripts/start-hiveserver2.sh"]

  tez-ui:
    image: hadoop-cluster-hive:latest
    container_name: hadoop-tez-ui
    hostname: tez-ui
    environment:
      <<: *versions
    depends_on:
      - namenode
    command: ["/opt/scripts/start-tez-ui.sh"]

  spark-history:
    image: hadoop-cluster-spark:latest
    container_name: hadoop-spark-history
    hostname: spark-history
    environment:
      <<: *versions
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    volumes:
      - ./hive/config/hive-site.xml:/opt/hadoop/etc/hadoop/hive-site.xml:ro
      - ./hive/config/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/config/log4j.properties:/opt/spark/conf/log4j.properties:ro
    depends_on:
      - namenode
      - datanode
    command: ["/opt/scripts/start-spark-history.sh"]

  jupyter:
    build:
      context: ./jupyter
      dockerfile: Dockerfile
      args:
        <<: *versions
    container_name: hadoop-jupyter
    hostname: jupyter
    ports:
      - "8888:8888"  # JupyterLab
    environment:
      <<: *versions
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    volumes:
      - ./jupyter/notebooks:/notebooks
      - ./hive/config/hive-site.xml:/opt/hadoop/etc/hadoop/hive-site.xml:ro
      - ./hive/config/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/config/log4j.properties:/opt/spark/conf/log4j.properties:ro
    depends_on:
      - namenode
      - datanode
    command: ["/opt/scripts/start-jupyter.sh"]

  kyuubi:
    build:
      context: ./kyuubi
      dockerfile: Dockerfile
      args:
        <<: *versions
    container_name: hadoop-kyuubi
    hostname: kyuubi
    depends_on:
      - namenode
      - datanode
      - spark-history
      - marquez
    ports:
      - "10009:10009"  # Thrift Binary
    environment:
      <<: *versions
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    volumes:
      - ./hive/config/hive-site.xml:/opt/hadoop/etc/hadoop/hive-site.xml:ro
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/config/log4j.properties:/opt/spark/conf/log4j.properties:ro
    command: ["/opt/scripts/start-kyuubi.sh"]

  webproxy:
    image: nginx:alpine
    container_name: hadoop-webproxy
    hostname: webproxy
    ports:
      - "9870:9870"    # HDFS NameNode UI
      - "8088:8088"    # YARN ResourceManager UI
      - "8188:8188"    # YARN Timeline Server
      - "9864:9864"    # HDFS DataNode UI
      - "8042:8042"    # YARN NodeManager UI
      - "10002:10002"  # HiveServer2 Web UI
      - "9999:9999"    # TEZ UI
      - "18080:18080"  # Spark History Server
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - namenode
      - datanode

volumes:
  postgres-data:
  marquez-data:
  namenode-data:
  namenode-logs:
  timeline-data:
  datanode-data:
  datanode-logs:
  hive-warehouse:
  hive-logs:

networks:
  default:
    name: hadoopclusternet
    driver: bridge