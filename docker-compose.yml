version: '3.8'

x-versions: &versions
  HADOOP_VERSION: ${HADOOP_VERSION}
  HIVE_VERSION: ${HIVE_VERSION}
  SPARK_VERSION: ${SPARK_VERSION}
  SCALA_VERSION: ${SCALA_VERSION}
  PYTHON_VERSION: ${PYTHON_VERSION}
  KYUUBI_VERSION: ${KYUUBI_VERSION}
  TEZ_VERSION: ${TEZ_VERSION}
  JUPYTER_VERSION: ${JUPYTER_VERSION}
  AIRFLOW_VERSION: ${AIRFLOW_VERSION}
  OPENLINEAGE_VERSION: ${OPENLINEAGE_VERSION}
  OPENLINEAGE_NAMESPACE: ${OPENLINEAGE_NAMESPACE}
  JAVA_VERSION: ${JAVA_VERSION}

# Окружение, общее для всех сервисов Airflow. Креды суперпользователя Postgres и
# учётка UI сюда не входят: они нужны только одноразовому airflow-init.
x-airflow-env: &airflow-env
  <<: *versions
  # Параметры роли метаданных — единственный источник и для DDL (ensure_db.py),
  # и для строки подключения Airflow ниже.
  AIRFLOW_DB_HOST: ${AIRFLOW_DB_HOST:-postgres}
  AIRFLOW_DB_PORT: "${AIRFLOW_DB_PORT:-5432}"
  AIRFLOW_DB_USER: ${AIRFLOW_DB_USER:-airflow}
  AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
  AIRFLOW_DB_NAME: ${AIRFLOW_DB_NAME:-airflow}
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER:-airflow}:${AIRFLOW_DB_PASSWORD:-airflow}@${AIRFLOW_DB_HOST:-postgres}:${AIRFLOW_DB_PORT:-5432}/${AIRFLOW_DB_NAME:-airflow}
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__DATABASE__LOAD_DEFAULT_CONNECTIONS: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
  # Пустой ключ = NullFernet: секреты Connection'ов и Variable лежат в БД
  # открытым текстом. Для реальных кредов задайте AIRFLOW_FERNET_KEY в .env.
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:-}
  AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
  # Коннекшен spark_yarn задаётся переменной окружения, поэтому в UI он не виден
  # и одноимённый коннекшен, созданный через UI, не применяется.
  AIRFLOW_CONN_SPARK_YARN: "spark://yarn?deploy-mode=cluster&spark-binary=spark-submit"
  HADOOP_USER_NAME: hadoop
  HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
  SPARK_HOME: /opt/spark

x-airflow-volumes: &airflow-volumes
  - ./airflow/dags:/opt/airflow/dags
  - ./airflow/jobs:/opt/airflow/jobs
  - ./spark/scripts/pyspark_pi.py:/opt/airflow/jobs/pyspark_pi.py:ro
  - ./airflow/logs:/opt/airflow/logs
  - ./hive/config/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
  - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
  - ./spark/config/log4j.properties:/opt/spark/conf/log4j.properties:ro

services:
  base:
    build:
      context: ./base
      dockerfile: Dockerfile
      args:
        <<: *versions
    image: ${BASE_IMAGE:-hadoop-cluster-base:latest}
    profiles: ["build"]
  spark-image:
    build:
      context: ./spark
      dockerfile: Dockerfile
      args:
        <<: *versions
    image: ${SPARK_IMAGE:-hadoop-cluster-spark:latest}
    profiles: ["build"]
  airflow-image:
    build:
      context: ./airflow
      dockerfile: Dockerfile
      args:
        <<: *versions
    image: ${AIRFLOW_IMAGE:-hadoop-cluster-airflow:latest}
    profiles: ["build"]
  marquez:
    image: marquezproject/marquez:${MARQUEZ_VERSION:-0.47.0}
    container_name: hadoop-marquez
    hostname: marquez
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *versions
      MARQUEZ_DB_HOST: marquez-db
      MARQUEZ_DB_PORT: 5432
      MARQUEZ_DB: marquez
      MARQUEZ_USER: marquez
      MARQUEZ_PASSWORD: marquez
      MARQUEZ_PORT: 5000
      MARQUEZ_CONFIG: /usr/src/app/config/config.yml
    ports:
      - "5000:5000"  # OpenLineage/Marquez API
    volumes:
      - ./marquez/config:/usr/src/app/config:ro

  marquez-web:
    image: marquezproject/marquez-web:${MARQUEZ_VERSION:-0.47.0}
    container_name: hadoop-marquez-web
    hostname: marquez-web
    depends_on:
      - marquez
    environment:
      <<: *versions
      MARQUEZ_HOST: marquez
      MARQUEZ_PORT: 5000
      MARQUEZ_URL: http://marquez:5000
      WEB_PORT: 3000
    ports:
      - "3000:3000"  # Marquez Web UI
  postgres:
    image: postgres:13
    container_name: hadoop-postgres
    hostname: postgres
    environment:
      <<: *versions
      POSTGRES_DB: hive_metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"  # бывший порт marquez-db, сохранён для совместимости
      - "5434:5432"  # Hive Metastore PostgreSQL
    networks:
      default:
        aliases:
          - marquez-db
    healthcheck:
      # -h 127.0.0.1 форсирует TCP: во время initdb сервер слушает только unix-сокет
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U hive -d hive_metastore"]
      interval: 5s
      timeout: 5s
      retries: 20

  hadoop:
    image: ${SPARK_IMAGE:-hadoop-cluster-spark:latest}
    container_name: hadoop-node
    hostname: hadoop-node
    user: "0:0"
    volumes:
      - namenode-data:/opt/hadoop/dfs/name
      - hadoop-logs:/opt/hadoop/logs
      - datanode-data:/opt/hadoop/dfs/data
      - timeline-data:/opt/hadoop/timeline-data
      - ./hive/config/hive-site.xml:/opt/hadoop/etc/hadoop/hive-site.xml:ro
      - ./hive/config/tez-site.xml:/opt/hadoop/etc/hadoop/tez-site.xml:ro
      - ./hive/config/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/config/log4j.properties:/opt/spark/conf/log4j.properties:ro
    environment:
      <<: *versions
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    networks:
      default:
        aliases:
          - namenode
          - datanode
          - spark-history
    command: ["/opt/scripts/start-hadoop.sh"]

  hive:
    build:
      context: ./hive
      dockerfile: Dockerfile
      args:
        <<: *versions
    image: ${HIVE_IMAGE:-hadoop-cluster-hive:latest}
    container_name: hadoop-hive
    hostname: hadoop-hive
    ports:
      - "9083:9083"    # Hive Metastore Thrift
      - "10000:10000"  # HiveServer2 Thrift
    volumes:
      - hive-warehouse:/opt/hive/warehouse
      - hive-logs:/opt/hive/logs
      - tez-ui-static:/srv/tez-ui
    environment:
      <<: *versions
    networks:
      default:
        aliases:
          - hive-metastore
          - hiveserver2
    depends_on:
      postgres:
        condition: service_healthy
      hadoop:
        condition: service_started
    command: ["/opt/scripts/start-hive.sh"]

  jupyter:
    build:
      context: ./jupyter
      dockerfile: Dockerfile
      args:
        <<: *versions
    image: ${JUPYTER_IMAGE:-hadoop-cluster-jupyter:latest}
    container_name: hadoop-jupyter
    hostname: jupyter
    ports:
      - "8888:8888"  # JupyterLab
    environment:
      <<: *versions
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    volumes:
      - ./jupyter/notebooks:/notebooks
      - ./hive/config/hive-site.xml:/opt/hadoop/etc/hadoop/hive-site.xml:ro
      - ./hive/config/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/config/log4j.properties:/opt/spark/conf/log4j.properties:ro
      - ${OL_RESOLVER_JAR:-./spark/jars/openlineage-namespace-resolver.jar}:/opt/spark/jars/openlineage-namespace-resolver.jar:ro
    depends_on:
      - hadoop
    command: ["/opt/scripts/start-jupyter.sh"]

  airflow-init:
    image: ${AIRFLOW_IMAGE:-hadoop-cluster-airflow:latest}
    container_name: hadoop-airflow-init
    hostname: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-env
      # Суперпользователь, от имени которого создаются роль и база; значения обязаны
      # совпадать с POSTGRES_* сервиса postgres (их же использует hive-site.xml).
      # Живут только здесь: долгоживущим сервисам Airflow они не нужны.
      AIRFLOW_DB_ADMIN_USER: hive
      AIRFLOW_DB_ADMIN_PASSWORD: hive
      AIRFLOW_DB_ADMIN_DB: hive_metastore
      # Учётка UI создаётся один раз при первичной инициализации; стенд рассчитан
      # только на локальный запуск, дефолтный admin/admin наружу публиковать нельзя.
      AIRFLOW_ADMIN_USER: ${AIRFLOW_ADMIN_USER:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-admin}
    volumes: *airflow-volumes
    entrypoint: ["/opt/airflow/scripts/init-airflow.sh"]
    restart: "no"

  airflow-webserver:
    image: ${AIRFLOW_IMAGE:-hadoop-cluster-airflow:latest}
    container_name: hadoop-airflow-webserver
    hostname: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes: *airflow-volumes
    ports:
      - "8080:8080"  # Airflow Web UI
    command: ["webserver"]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 30

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE:-hadoop-cluster-airflow:latest}
    container_name: hadoop-airflow-scheduler
    hostname: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes: *airflow-volumes
    command: ["scheduler"]
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 10s
      timeout: 10s
      retries: 30

  kyuubi:
    build:
      context: ./kyuubi
      dockerfile: Dockerfile
      args:
        <<: *versions
    image: ${KYUUBI_IMAGE:-hadoop-cluster-kyuubi:latest}
    container_name: hadoop-kyuubi
    hostname: kyuubi
    depends_on:
      - hadoop
      - marquez
    ports:
      - "10009:10009"  # Thrift Binary
    environment:
      <<: *versions
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
    volumes:
      - ./hive/config/hive-site.xml:/opt/hadoop/etc/hadoop/hive-site.xml:ro
      - ./spark/config/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf:ro
      - ./spark/config/log4j.properties:/opt/spark/conf/log4j.properties:ro
    command: ["/opt/scripts/start-kyuubi.sh"]

  webproxy:
    image: nginx:alpine
    container_name: hadoop-webproxy
    hostname: webproxy
    ports:
      - "9870:9870"    # HDFS NameNode UI
      - "8088:8088"    # YARN ResourceManager UI
      - "8188:8188"    # YARN Timeline Server
      - "9864:9864"    # HDFS DataNode UI
      - "8042:8042"    # YARN NodeManager UI
      - "10002:10002"  # HiveServer2 Web UI
      - "9999:9999"    # TEZ UI
      - "18080:18080"  # Spark History Server
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - tez-ui-static:/usr/share/nginx/tez-ui:ro
    networks:
      default:
        aliases:
          - tez-ui
    depends_on:
      - hadoop

volumes:
  postgres-data:
  namenode-data:
  hadoop-logs:
  timeline-data:
  datanode-data:
  hive-warehouse:
  hive-logs:
  tez-ui-static:

networks:
  default:
    name: hadoopclusternet
    driver: bridge