# Spark defaults
spark.master                       yarn
spark.submit.deployMode            client
spark.eventLog.enabled             true
spark.eventLog.dir                 hdfs://namenode:9000/spark-events
spark.history.fs.logDirectory      hdfs://namenode:9000/spark-events
spark.sql.warehouse.dir            hdfs://namenode:9000/user/hive/warehouse
spark.sql.catalogImplementation    hive
spark.hadoop.fs.defaultFS          hdfs://namenode:9000
spark.hadoop.yarn.resourcemanager.address namenode:8032
spark.yarn.historyServer.address   spark-history:18080
spark.executor.extraJavaOptions    -Dlog4j.configuration=file:/opt/spark/conf/log4j.properties

# OpenLineage (Marquez) integration
# JAR already included in image: /opt/spark/jars/openlineage-spark_2.13-1.21.0.jar
spark.extraListeners                 io.openlineage.spark.agent.OpenLineageSparkListener
spark.openlineage.namespace          hadoop-cluster
# Using HTTP transport for Marquez API
spark.openlineage.transport.type     http
spark.openlineage.transport.url      http://marquez:5000

# Spark resource tuning to allow multiple concurrent YARN apps
spark.executor.cores                 1
spark.executor.memory                1g
spark.executor.instances             1
spark.driver.memory                  512m
spark.yarn.am.memory                 256m

# Ensure consistent Python for AM/executors on YARN (version-agnostic path)
# Driver Python is controlled via PYSPARK_DRIVER_PYTHON in start-jupyter.sh (jupyter)
spark.pyspark.python                 /opt/python/bin/python3
spark.executorEnv.PYSPARK_PYTHON     /opt/python/bin/python3
spark.yarn.appMasterEnv.PYSPARK_PYTHON /opt/python/bin/python3

